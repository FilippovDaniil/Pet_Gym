<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Администратор — Фитнес-клуб</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="d-flex">
    <nav class="sidebar d-flex flex-column p-0" style="width:220px;min-width:220px">
        <a href="#" class="brand">🏋️ FitClub</a>
        <ul class="nav flex-column flex-grow-1">
            <li><a class="nav-link active" href="#" onclick="showTab('tab-types')">💳 Типы абонементов</a></li>
            <li><a class="nav-link" href="#" onclick="showTab('tab-reports')">📊 Отчёты</a></li>
            <li><a class="nav-link" href="#" onclick="showTab('tab-staff')">👤 Сотрудники</a></li>
            <li><a class="nav-link" href="#" onclick="showTab('tab-new-staff')">➕ Добавить сотрудника</a></li>
        </ul>
        <div class="p-3">
            <small class="text-secondary" id="sidebar-name"></small><br>
            <a href="#" class="text-danger small" onclick="logout()">Выйти</a>
        </div>
    </nav>

    <div class="main-content flex-grow-1 p-4">
        <div id="alert-ok" class="alert alert-success d-none"></div>
        <div id="alert-err" class="alert alert-danger d-none"></div>

        <!-- Membership types -->
        <div id="tab-types">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Типы абонементов</h4>
                <button class="btn btn-primary btn-sm" onclick="showTypeForm()">+ Добавить</button>
            </div>
            <div id="type-form-card" class="card mb-4 d-none">
                <div class="card-body">
                    <h6 id="type-form-title">Новый тип</h6>
                    <form id="type-form" class="row g-2">
                        <input type="hidden" id="type-id">
                        <div class="col-12 col-md-5">
                            <input class="form-control" id="type-name" placeholder="Название" required>
                        </div>
                        <div class="col-6 col-md-3">
                            <input class="form-control" id="type-days" type="number" placeholder="Дней" min="1" required>
                        </div>
                        <div class="col-6 col-md-2">
                            <input class="form-control" id="type-price" type="number" placeholder="Цена ₽" min="0" required>
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-success">Сохранить</button>
                            <button type="button" class="btn btn-secondary ms-1" onclick="hideTypeForm()">Отмена</button>
                        </div>
                    </form>
                </div>
            </div>
            <table class="table table-hover">
                <thead><tr><th>Название</th><th>Дней</th><th>Цена</th><th>Статус</th><th>Действия</th></tr></thead>
                <tbody id="types-table"></tbody>
            </table>
        </div>

        <!-- Reports -->
        <div id="tab-reports" class="d-none">
            <h4>Финансовые отчёты</h4>
            <div class="row g-3 mb-4 align-items-end">
                <div class="col-auto">
                    <label class="form-label">С</label>
                    <input type="date" class="form-control" id="rep-from">
                </div>
                <div class="col-auto">
                    <label class="form-label">По</label>
                    <input type="date" class="form-control" id="rep-to">
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary" onclick="loadReport()">Сформировать</button>
                </div>
            </div>
            <div id="report-cards" class="row g-3 mb-4"></div>
            <div id="report-table-container" class="d-none">
                <h6>Продажи по типам</h6>
                <table class="table table-sm">
                    <thead><tr><th>Тип абонемента</th><th>Продано</th></tr></thead>
                    <tbody id="report-types-table"></tbody>
                </table>
            </div>
        </div>

        <!-- Staff -->
        <div id="tab-staff" class="d-none">
            <h4>Сотрудники</h4>
            <table class="table table-hover">
                <thead><tr><th>Имя</th><th>Email</th><th>Роль</th><th>Телефон</th></tr></thead>
                <tbody id="staff-table"></tbody>
            </table>
        </div>

        <!-- New Staff -->
        <div id="tab-new-staff" class="d-none">
            <h4>Добавить сотрудника</h4>
            <form id="staff-form" style="max-width:500px">
                <div class="row g-2 mb-2">
                    <div class="col"><input class="form-control" id="st-first" placeholder="Имя" required></div>
                    <div class="col"><input class="form-control" id="st-last" placeholder="Фамилия" required></div>
                </div>
                <input class="form-control mb-2" id="st-email" type="email" placeholder="Email" required>
                <input class="form-control mb-2" id="st-password" type="password" placeholder="Пароль" required>
                <input class="form-control mb-2" id="st-phone" placeholder="Телефон">
                <select class="form-select mb-2" id="st-role" onchange="toggleTrainerFields()">
                    <option value="RECEPTION">Ресепшен</option>
                    <option value="TRAINER">Тренер</option>
                    <option value="ADMIN">Администратор</option>
                </select>
                <div id="trainer-fields" class="d-none">
                    <input class="form-control mb-2" id="st-spec" placeholder="Специализация">
                    <textarea class="form-control mb-2" id="st-bio" placeholder="О тренере..." rows="2"></textarea>
                </div>
                <button type="submit" class="btn btn-success">Создать</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
