<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренер — Фитнес-клуб</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="d-flex">
    <nav class="sidebar d-flex flex-column p-0" style="width:220px;min-width:220px">
        <a href="#" class="brand">🏋️ FitClub</a>
        <ul class="nav flex-column flex-grow-1">
            <li><a class="nav-link active" href="#" onclick="showTab('tab-schedule')">📅 Расписание</a></li>
            <li><a class="nav-link" href="#" onclick="showTab('tab-clients')">👥 Мои клиенты</a></li>
            <li><a class="nav-link" href="#" onclick="showTab('tab-programs')">📋 Программы</a></li>
            <li><a class="nav-link" href="#" onclick="showTab('tab-notifications')">🔔 Уведомления</a></li>
        </ul>
        <div class="p-3">
            <small class="text-secondary" id="sidebar-name"></small><br>
            <a href="#" class="text-danger small" onclick="logout()">Выйти</a>
        </div>
    </nav>

    <div class="main-content flex-grow-1 p-4">
        <div id="alert-ok" class="alert alert-success d-none"></div>
        <div id="alert-err" class="alert alert-danger d-none"></div>

        <!-- Schedule -->
        <div id="tab-schedule">
            <h4>Мои тренировки</h4>
            <table class="table table-hover">
                <thead><tr><th>Клиент</th><th>Дата/время</th><th>Статус</th><th>Действия</th></tr></thead>
                <tbody id="schedule-table"></tbody>
            </table>
        </div>

        <!-- Clients -->
        <div id="tab-clients" class="d-none">
            <h4>Мои клиенты</h4>
            <table class="table table-hover">
                <thead><tr><th>Имя</th><th>Email</th><th>Действия</th></tr></thead>
                <tbody id="clients-table"></tbody>
            </table>
        </div>

        <!-- Programs -->
        <div id="tab-programs" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Программы тренировок</h4>
            </div>
            <div id="programs-list" class="mb-4"></div>

            <div id="program-editor" class="card d-none">
                <div class="card-header">
                    <h6 id="editor-title">Новая программа</h6>
                </div>
                <div class="card-body">
                    <input type="hidden" id="prog-id">
                    <input type="hidden" id="prog-client-id">
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Клиент</label>
                            <select class="form-select" id="prog-client-select"></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Название программы</label>
                            <input class="form-control" id="prog-name" placeholder="Напр. 'Программа силы'">
                        </div>
                    </div>
                    <h6>Упражнения</h6>
                    <div id="exercises-list"></div>
                    <button class="btn btn-outline-primary btn-sm mt-2" onclick="addExerciseRow()">+ Добавить упражнение</button>
                    <div class="mt-3">
                        <button class="btn btn-success" onclick="saveProgram()">Сохранить программу</button>
                        <button class="btn btn-secondary ms-2" onclick="closeProgramEditor()">Отмена</button>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary mt-3" onclick="openNewProgram()">+ Создать программу</button>
        </div>

        <!-- Notifications -->
        <div id="tab-notifications" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Уведомления</h4>
                <button class="btn btn-sm btn-outline-secondary" onclick="markAllRead()">Прочитать все</button>
            </div>
            <div id="notifications-list"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/trainer.js"></script>
</body>
</html>
