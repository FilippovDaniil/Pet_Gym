<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фитнес-клуб — Вход</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
<div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow" style="width:420px">
        <div class="card-header bg-primary text-white text-center py-4">
            <h3 class="mb-0">🏋️ Фитнес-клуб</h3>
            <small>Войдите в систему</small>
        </div>
        <div class="card-body p-4">
            <div id="error-msg" class="alert alert-danger d-none"></div>
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="admin@fit.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
            <hr>
            <div class="text-center">
                <small class="text-muted">Нет аккаунта?</small>
                <a href="#" class="ms-1" data-bs-toggle="collapse" data-bs-target="#reg-form">Зарегистрироваться</a>
            </div>
            <div class="collapse mt-3" id="reg-form">
                <div id="reg-error" class="alert alert-danger d-none"></div>
                <div id="reg-success" class="alert alert-success d-none"></div>
                <form id="register-form">
                    <div class="row g-2">
                        <div class="col-6">
                            <input type="text" class="form-control" id="reg-first" placeholder="Имя" required>
                        </div>
                        <div class="col-6">
                            <input type="text" class="form-control" id="reg-last" placeholder="Фамилия" required>
                        </div>
                    </div>
                    <input type="email" class="form-control mt-2" id="reg-email" placeholder="Email" required>
                    <input type="password" class="form-control mt-2" id="reg-password" placeholder="Пароль (мин. 6 символов)" required>
                    <input type="tel" class="form-control mt-2" id="reg-phone" placeholder="Телефон">
                    <button type="submit" class="btn btn-success w-100 mt-2">Зарегистрироваться</button>
                </form>
            </div>
        </div>
        <div class="card-footer text-muted small text-center">
            Тестовые аккаунты: admin@fit.com / admin | reception@fit.com / reception | trainer1@fit.com / trainer1
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
